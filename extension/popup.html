<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px; min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #e0e0e0;
    }
    .header {
      padding: 16px; border-bottom: 1px solid #2a2a4a;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 18px; }
    .header h1 span { color: #4fc3f7; }
    .header .ver { color: #888; font-size: 12px; font-weight: normal; }
    .section { padding: 12px 16px; }
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .section-title.green { color: #4caf50; }
    .section-title.blue { color: #4fc3f7; }
    .section-title.orange { color: #ff9800; }
    .section-title.purple { color: #ba68c8; }
    .row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 6px 0; font-size: 13px;
    }
    .row .label { color: #aaa; }
    .row .value { color: #fff; font-weight: 500; }
    .row .value.connected { color: #4caf50; }
    .row .value.none { color: #666; font-style: italic; }
    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin: 4px 0; transition: all 0.2s;
    }
    .btn-primary { background: #4fc3f7; color: #000; }
    .btn-primary:hover { background: #29b6f6; }
    .btn-danger {
      background: transparent; color: #f44336;
      border: 1px solid #f44336; font-size: 12px; padding: 6px;
    }
    .btn-danger:hover { background: #f44336; color: #fff; }
    .input-row { display: flex; gap: 8px; margin: 8px 0; }
    .input-row input {
      flex: 1; padding: 8px; border: 1px solid #333;
      border-radius: 4px; background: #0d0d1a; color: #fff; font-size: 12px;
    }
    .input-row button {
      padding: 8px 12px; border: none; border-radius: 4px;
      background: #4caf50; color: #fff; font-size: 12px;
      cursor: pointer; white-space: nowrap;
    }
    .task-item {
      padding: 4px 0; font-size: 12px; color: #ccc;
      border-bottom: 1px solid #1a1a2e;
    }
    .task-item:last-child { border: none; }
    .footer {
      padding: 12px 16px; border-top: 1px solid #2a2a4a;
      display: flex; justify-content: space-between;
      align-items: center; font-size: 11px; color: #666;
    }
    .footer a { color: #4fc3f7; text-decoration: none; }
    .tools-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4px; margin-top: 8px;
    }
    .tool-badge {
      padding: 4px 8px; border-radius: 4px;
      background: #2a2a4a; color: #aaa;
      font-size: 10px; text-align: center;
    }
    .tool-badge.active { background: #1b3a1b; color: #4caf50; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Agent</span>OS Bridge <span class="ver">v2.0.0</span></h1>
  </div>

  <!-- STATUS -->
  <div class="section">
    <div class="section-title green">STATUS</div>
    <div class="row"><span class="label">Connection</span><span class="value" id="connStatus">Checking...</span></div>
    <div class="row"><span class="label">Doc ID</span><span class="value" id="docIdDisplay">---</span></div>
    <div class="row"><span class="label">Sheet ID</span><span class="value" id="sheetIdDisplay">---</span></div>
  </div>

  <!-- CONNECT DOC -->
  <div class="section" id="connectSection">
    <div class="input-row">
      <input type="text" id="docUrlInput" placeholder="Paste Google Doc URL...">
      <button id="connectBtn">Connect</button>
    </div>
    <div class="input-row">
      <input type="text" id="sheetUrlInput" placeholder="Paste Google Sheet URL (optional)...">
      <button id="connectSheetBtn">Connect</button>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="section" id="actionsSection">
    <button class="btn btn-primary" id="readDocBtn">Read Doc</button>
  </div>

  <!-- TOOLS -->
  <div class="section">
    <div class="section-title blue">TOOLS AVAILABLE</div>
    <div class="tools-grid">
      <div class="tool-badge active">TASK_DONE</div>
      <div class="tool-badge active">ADD_TASK</div>
      <div class="tool-badge active">SKIP</div>
      <div class="tool-badge active">BROWSE</div>
      <div class="tool-badge active">SHEET_WRITE</div>
      <div class="tool-badge active">SHEET_READ</div>
      <div class="tool-badge active">SHEET_APPEND</div>
      <div class="tool-badge active">SAVE_NOTE</div>
    </div>
  </div>

  <!-- TODO -->
  <div class="section" id="todoSection">
    <div class="section-title orange">TODO</div>
    <div id="todoList"><div class="task-item" style="color:#666">Loading...</div></div>
  </div>

  <!-- DONE -->
  <div class="section" id="doneSection">
    <div class="section-title purple">RECENTLY DONE</div>
    <div id="doneList"><div class="task-item" style="color:#666">No completed tasks yet</div></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>AgentOS</span>
    <a href="#" id="disconnectBtn">Disconnect</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
